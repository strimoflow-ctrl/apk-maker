<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naino Academy</title>
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      background-color: #050505;
    }

    #initial-loader {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #050505;
      z-index: 99999;
    }

    .logo-pulse {
      width: 80px;
      height: 80px;
      animation: pulse 1.5s infinite alternate;
      filter: drop-shadow(0 0 15px rgba(50, 215, 75, 0.4));
    }

    @keyframes pulse {
      0% {
        transform: scale(0.95);
        opacity: 0.8;
      }

      100% {
        transform: scale(1.05);
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <div id="initial-loader">
      <img src="/logo.png" alt="Naino Academy" class="logo-pulse" />
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
